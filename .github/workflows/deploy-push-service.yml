name: Deploy push-service to Azure

# Auto-deploys the push-service whenever you push changes to it on main.
# One-time setup is in push-service/DEPLOY_AZURE.md (create the Web App, add the
# AZURE_WEBAPP_PUBLISH_PROFILE secret, set AZURE_WEBAPP_NAME below).

on:
  push:
    branches: [ main ]
    paths:
      - "push-service/**"
      - ".github/workflows/deploy-push-service.yml"
  workflow_dispatch:        # lets you trigger a deploy manually from the Actions tab

env:
  AZURE_WEBAPP_NAME: kura-push      # <-- change to your Azure Web App name
  PYTHON_VERSION: "3.11"

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: push-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: push-service
        run: pytest -q

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: push-service
